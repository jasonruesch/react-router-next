name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency: ${{ github.workflow }}-main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Get next version
        id: next_version
        run: |
          npx changeset status --output=release.json
          VERSION=$(node -p "const r = require('./release.json').releases.find(r => r.name === '@evolonix/react-router-next' && r.type !== 'none'); r?.newVersion ?? ''")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          rm -f release.json
      - uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
          commit: "chore(release): version packages${{ steps.next_version.outputs.version && format(' {0}', steps.next_version.outputs.version) || '' }}"
          title: "chore(release): version packages${{ steps.next_version.outputs.version && format(' {0}', steps.next_version.outputs.version) || '' }}"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
