name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      IS_RELEASE: ${{ startsWith(github.event.head_commit.message, 'chore(release):') || startsWith(github.event.pull_request.title, 'chore(release):') }}
    steps:
      - if: env.IS_RELEASE != 'true'
        uses: actions/checkout@v6
      - if: env.IS_RELEASE != 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - if: env.IS_RELEASE != 'true'
        run: npm ci
      - if: env.IS_RELEASE != 'true'
        run: npm run format:check
      - if: env.IS_RELEASE != 'true'
        run: npm run lint
      - if: env.IS_RELEASE != 'true'
        run: npm run typecheck
      - if: env.IS_RELEASE != 'true'
        run: npm run build
